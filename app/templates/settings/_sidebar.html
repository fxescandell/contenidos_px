<div class="sidebar">
    <h3>Configuracion</h3>
    <div id="mode-switch-box" style="padding:10px 12px; background:#f0f7ff; border:1px solid #cce0ff; border-radius:8px; margin-bottom:12px;">
        <div style="font-size:11px; color:#666; margin-bottom:6px; font-weight:600;">MODO ACTIVO</div>
        <div id="mode-switch" style="display:flex; background:#ddd; border-radius:20px; padding:3px; gap:2px; cursor:pointer;">
            <style>
                .mode-btn { flex:1; text-align:center; padding:6px 0; border-radius:18px; font-size:12px; font-weight:600; color:#555; transition: all .2s; user-select:none; }
                .mode-btn.active { background:#0066cc; color:white; }
                .mode-btn:not(.active):hover { background:#ccc; }
            </style>
            <div id="mode-btn-smb" class="mode-btn active" onclick="switchMode('smb')">SMB / FTP</div>
            <div id="mode-btn-local" class="mode-btn" onclick="switchMode('local')">Local</div>
        </div>
        <div id="mode-label" style="font-size:11px; color:#888; margin-top:4px; text-align:center;">SMB / FTP</div>
    </div>

    <div style="font-size:10px; color:#999; text-transform:uppercase; letter-spacing:1px; margin:8px 0 4px 0; padding-left:8px;">General</div>
    <ul class="menu-list">
        <li><a href="/settings/general" {% if active_page == 'general' %}class="active"{% endif %}>1. General</a></li>
        <li><a href="/settings/telegram" {% if active_page == 'telegram' %}class="active"{% endif %}>2. Telegram</a></li>
        <li><a href="/settings/flows" {% if active_page == 'flows' %}class="active"{% endif %}>3. Flujos</a></li>
        <li><a href="/settings/processing" {% if active_page == 'processing' %}class="active"{% endif %}>4. Procesamiento</a></li>
        <li><a href="/settings/publishing" {% if active_page == 'publishing' %}class="active"{% endif %}>5. Publicacion</a></li>
        <li><a href="/settings/ai" {% if active_page == 'ai' %}class="active"{% endif %}>6. OCR e IA</a></li>
        <li><a href="/settings/categories" {% if active_page == 'categories' %}class="active"{% endif %}>7. Categorias</a></li>
    </ul>

    <div style="font-size:10px; color:#999; text-transform:uppercase; letter-spacing:1px; margin:8px 0 4px 0; padding-left:8px;">Entrada / Salida</div>
    <ul class="menu-list">
        <li><a href="/settings/inbox" {% if active_page == 'inbox' %}class="active"{% endif %}><span id="inbox-label">8. Entrada (SMB)</span></a></li>
        <li><a href="/settings/outfolder" {% if active_page == 'outfolder' %}class="active"{% endif %}><span id="outfolder-label">9. Salida (FTP)</span></a></li>
    </ul>

    <div style="font-size:10px; color:#999; text-transform:uppercase; letter-spacing:1px; margin:8px 0 4px 0; padding-left:8px;">Sistema</div>
    <ul class="menu-list">
        <li><a href="/settings/paths" {% if active_page == 'paths' %}class="active"{% endif %}>10. Rutas de trabajo</a></li>
        <li><a href="/settings/tools" {% if active_page == 'tools' %}class="active"{% endif %}>11. Herramientas Test</a></li>
    </ul>
</div>

<script>
function switchMode(mode) {
    fetch('/api/v1/flows/switch-mode?mode=' + encodeURIComponent(mode), {
        method: 'POST',
    }).then(r => r.json()).then(data => {
        if (data.success) {
            window.location.reload();
        }
    }).catch(() => {});
}
(function() {
    fetch('/api/v1/flows/active-mode').then(r => r.json()).then(data => {
        var mode = data.mode || 'smb';
        var btnSmb = document.getElementById('mode-btn-smb');
        var btnLocal = document.getElementById('mode-btn-local');
        var label = document.getElementById('mode-label');
        var inboxLabel = document.getElementById('inbox-label');
        var outfolderLabel = document.getElementById('outfolder-label');
        if (mode === 'local') {
            btnSmb.classList.remove('active');
            btnLocal.classList.add('active');
            label.textContent = 'Local';
            inboxLabel.textContent = '8. Entrada (Local)';
            outfolderLabel.textContent = '9. Salida (Local)';
        } else {
            btnLocal.classList.remove('active');
            btnSmb.classList.add('active');
            label.textContent = 'SMB / FTP';
            inboxLabel.textContent = '8. Entrada (SMB)';
            outfolderLabel.textContent = '9. Salida (FTP)';
        }
    }).catch(() => {});
})();
</script>
